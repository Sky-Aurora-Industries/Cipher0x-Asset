<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA | SENSITIVE VAULT</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
            color: #f00;
        }
        
        /* Gambar Latar Kedap-kedip Guntur */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('data_.png') no-repeat center center;
            background-size: cover;
            filter: brightness(15%) contrast(120%);
            z-index: 0;
            animation: guntur_blitz 7s infinite;
        }

        @keyframes guntur_blitz {
            0%, 92%, 100% { filter: brightness(15%) contrast(120%); }
            94% { filter: brightness(200%) contrast(150%); } 
            96% { filter: brightness(15%) contrast(120%); }
            98% { filter: brightness(150%) contrast(130%); }
        }

        /* Huruf Matrix Merah Berjatuhan */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.5; }

        .main-container {
            position: relative;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .login-box {
            border: 2px solid #f00;
            padding: 30px;
            max-width: 500px;
            background: rgba(10, 0, 0, 0.9);
            box-shadow: 0 0 25px #f00;
        }

        input[type="password"] {
            background: #000; border: 1px solid #f00; color: #f00;
            padding: 10px; width: 80%; text-align: center; margin-bottom: 20px;
        }

        .auth-btn {
            background: #f00; border: none; color: #000;
            padding: 10px 25px; cursor: pointer; font-weight: bold;
        }

        /* Style Card File */
        .file-card { 
            background: rgba(30, 0, 0, 0.8); 
            border: 1px solid #f00; 
            padding: 15px; 
            margin-bottom: 10px; 
            text-align: left;
        }

        .download-now { 
            color: #fff; background: #f00; 
            padding: 5px 10px; text-decoration: none; 
            font-size: 0.8rem; display: inline-block; margin-top: 5px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-overlay"></div>
    <canvas id="matrix"></canvas>

    <div class="main-container">
        <div id="login-area" class="login-box">
            <h2 style="letter-spacing: 5px;">[ SENSITIVE AREA ]</h2>
            <input type="password" id="passInput" placeholder="ENTER CODE">
            <br>
            <button class="auth-btn" onclick="checkAuth()">DECRYPT</button>
        </div>

        <div id="secret-assets" class="login-box" style="display: none;">
            <h3 style="color: #0f0;">[ ACCESS GRANTED: 2 FILES ]</h3>
            
            <div class="file-card">
                <strong>shadow_asset_18.sqlite</strong><br>
                <small style="color: #888;">Size: 18.78 MB | Status: Uploaded</small><br>
                <a href="shadow_asset_18.sql" class="download-now" download>FORCE EXTRACT</a>
            </div>

            <div class="file-card">
                <strong>system_config_v2.sql</strong><br>
                <small style="color: #888;">Size: 4.66 MB | Target: itools.de</small><br>
                <a href="system_config_v2.sql" class="download-now" download>FORCE EXTRACT</a>
            </div>

            <a href="index.html" style="color: #fff; font-size: 0.7rem;">[ EXIT ]</a>
        </div>
    </div>

    <script>
        // Logic Matrix
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "010101ABCDEF";
        const fontSize = 16;
        const drops = Array(Math.floor(canvas.width/fontSize)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#f00";
            drops.forEach((y, i) => {
                ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*fontSize, y*fontSize);
                if(y*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);

        // Logic Login
        function checkAuth() {
            const pass = document.getElementById('passInput').value;
            if (pass === "Talaud2026") {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('secret-assets').style.display = 'block';
            }
        }
    </script>
</body>
</html>
