<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIPHER0X | GLOBAL ACCESS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('logo_hack.png') no-repeat center center;
            background-size: cover; filter: brightness(20%); z-index: 0;
            animation: lightning 4s infinite;
        }

        @keyframes lightning {
            0%, 90%, 100% { filter: brightness(20%); }
            95% { filter: brightness(100%) contrast(150%); }
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.5; }

        /* Terminal Boot Effect */
        #boot-screen {
            position: absolute; top: 20px; left: 20px; z-index: 3;
            color: #0f0; font-size: 0.8rem; text-shadow: 0 0 5px #0f0;
            pointer-events: none; text-align: left;
        }

        .container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 4; text-align: center; width: 100%;
        }

        .glitch-title {
            color: #fff; font-size: 3.5rem; font-weight: bold; letter-spacing: 15px;
            text-shadow: 2px 2px #f00, -2px -2px #00f; margin-bottom: 10px;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        .sub-text { color: #0f0; letter-spacing: 5px; margin-bottom: 40px; font-weight: bold; }

        .menu-wrapper { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

        .btn {
            padding: 15px 35px; border: 1px solid #0f0; color: #0f0;
            text-decoration: none; font-weight: bold; background: rgba(0,0,0,0.8);
            transition: 0.3s; position: relative; overflow: hidden;
        }

        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }
        .btn-red { border-color: #f00; color: #f00; }
        .btn-red:hover { background: #f00; color: #000; box-shadow: 0 0 30px #f00; }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <canvas id="matrix"></canvas>

    <div id="boot-screen"></div>

    <div class="container">
        <div class="glitch-title">CIPHER0X</div>
        <div class="sub-text">NO SYSTEM IS SAFE. WE ARE EVERYWHERE.</div>
        
        <div class="menu-wrapper">
            <a href="archives_level_01.html" class="btn">[ PUBLIC_ARCHIVE ]</a>
            <a href="blackbox_secret_99.html" class="btn btn-red">[ SENSITIVE_VAULT ]</a>
        </div>
    </div>

    <script>
        // Terminal Boot Script
        const bootLines = [
            "> Initializing Ghost-Rider Protocol...",
            "> Bypassing Global Firewalls... [DONE]",
            "> Injecting Aurora-Lite-Payload...",
            "> Encrypting Local Session...",
            "> Connection: SECURE via Tunneled Proxy",
            "> Tracking IP... [HIDDEN]",
            "> WELCOME, OPERATOR: KING SKY"
        ];
        let lineIdx = 0;
        function typeBoot() {
            if (lineIdx < bootLines.length) {
                document.getElementById('boot-screen').innerHTML += bootLines[lineIdx] + "<br>";
                lineIdx++;
                setTimeout(typeBoot, 600);
            }
        }
        typeBoot();

        // Matrix Script
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "0101010101010101ABCDEF";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
