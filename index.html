<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIPHER0X | PORTAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        /* Background Gambar logo_hack.png */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('logo_hack.png') no-repeat center center;
            background-size: cover;
            filter: brightness(35%); /* Bikin agak gelap */
            z-index: 0;
            animation: lightning 6s infinite;
        }

        /* Efek Guntur Kedap-Kedip */
        @keyframes lightning {
            0%, 95%, 100% { filter: brightness(35%); }
            97% { filter: brightness(150%) contrast(120%); }
            98% { filter: brightness(40%); }
            99% { filter: brightness(180%); }
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.7; }

        .content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2; text-align: center; font-family: 'Courier New', monospace;
        }

        .enter-btn {
            padding: 15px 30px; border: 2px solid #0f0; color: #0f0;
            text-decoration: none; font-weight: bold; font-size: 1.2rem;
            background: rgba(0,0,0,0.5); letter-spacing: 5px;
            transition: 0.3s; cursor: pointer;
        }

        .enter-btn:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <canvas id="matrix"></canvas>

    <div class="content">
        <a href="archives_level_01.html" class="enter-btn">[ INITIALIZE ACCESS ]</a>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";

            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
