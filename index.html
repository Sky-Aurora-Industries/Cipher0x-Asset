<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIPHER0X | FIREWALL ACTIVE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('logo_hack.png') no-repeat center center;
            background-size: cover; filter: brightness(20%); z-index: 0;
            animation: lightning 4s infinite;
        }

        @keyframes lightning {
            0%, 90%, 100% { filter: brightness(20%); }
            95% { filter: brightness(100%) contrast(150%); }
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.5; }

        /* Layar Firewall */
        #firewall-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            color: #0f0; text-align: center;
        }

        .loader {
            border: 2px solid #333; border-top: 2px solid #0f0;
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 4; text-align: center; width: 100%; }
        .glitch-title { color: #fff; font-size: 3.5rem; font-weight: bold; letter-spacing: 15px; text-shadow: 2px 2px #f00, -2px -2px #00f; }
        .btn { padding: 15px 35px; border: 1px solid #0f0; color: #0f0; text-decoration: none; font-weight: bold; background: rgba(0,0,0,0.8); margin: 10px; display: inline-block; cursor: pointer; }
        .btn:hover { background: #0f0; color: #000; }
        .btn-red { border-color: #f00; color: #f00; }
    </style>
</head>
<body>

    <div id="firewall-screen">
        <div class="loader"></div>
        <h2 id="fw-status">FIREWALL: INITIALIZING SCAN...</h2>
        <p id="fw-details">Checking browser integrity & bot signatures...</p>
    </div>

    <div class="bg-overlay"></div>
    <canvas id="matrix"></canvas>

    <div class="container" id="main-content">
        <div class="glitch-title">CIPHER0X</div>
        <p style="color:#0f0;">CIPHER0X-WAF: <span style="color:#fff;">VERIFIED</span></p>
        <div class="menu-wrapper">
            <a href="archives_level_01.html" class="btn">[ ARCHIVE ]</a>
            <a href="blackbox_secret_99.html" class="btn btn-red">[ VAULT ]</a>
        </div>
    </div>

    <script>
        // FIREWALL LOGIC (LOGIC GATE)
        window.onload = function() {
            const status = document.getElementById('fw-status');
            const details = document.getElementById('fw-details');
            const screen = document.getElementById('firewall-screen');
            const content = document.getElementById('main-content');

            // 1. Cek User Agent (Bot Detection)
            const isBot = /bot|googlebot|crawler|spider|robot|crawling/i.test(navigator.userAgent);
            
            setTimeout(() => {
                if (isBot) {
                    status.innerText = "ACCESS DENIED";
                    status.style.color = "red";
                    details.innerText = "Malicious Bot Signature Detected. IP Logged.";
                } else {
                    status.innerText = "FIREWALL: PASS";
                    details.innerText = "Integrity Verified. Welcome, Human.";
                    setTimeout(() => {
                        screen.style.display = 'none';
                        content.style.display = 'block';
                    }, 1000);
                }
            }, 2000);
        };

        // Anti-Inspect Element
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };

        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "01";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
