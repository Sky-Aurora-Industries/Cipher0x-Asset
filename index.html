<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIPHER0X | PORTAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; color: #0f0; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('logo_hack.png') no-repeat center center; background-size: cover; filter: brightness(15%); z-index: 0; animation: lightning 5s infinite; }
        @keyframes lightning { 0%, 90%, 100% { filter: brightness(15%); } 95% { filter: brightness(120%) contrast(150%); } }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.4; }
        .main-container { position: relative; z-index: 4; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .glitch-title { color: #fff; font-size: 3.5rem; font-weight: bold; letter-spacing: 15px; text-shadow: 3px 3px #f00, -3px -3px #00f; animation: glitch 1s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-4px, 4px); } 100% { transform: translate(0); } }
        .menu-wrapper { display: flex; gap: 20px; margin-top: 30px; }
        .btn { padding: 15px 30px; border: 2px solid #0f0; color: #0f0; text-decoration: none; font-weight: bold; background: rgba(0,0,0,0.8); transition: 0.3s; cursor: pointer; }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }
        .btn-red { border-color: #f00; color: #f00; }
        .btn-red:hover { background: #f00; color: #000; box-shadow: 0 0 20px #f00; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <canvas id="matrix"></canvas>
    <div class="main-container">
        <div class="glitch-title">CIPHER0X</div>
        <p style="color: #fff; letter-spacing: 3px;">SYSTEM STATUS: <span style="color: #0f0;">ONLINE</span></p>
        <div class="menu-wrapper">
            <a href="umum.html" class="btn">[ DATA UMUM ]</a>
            <a href="sensitive.html" class="btn btn-red">[ DATA SENSITIVE ]</a>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() { ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#0f0";
            drops.forEach((y, i) => { ctx.fillText(Math.floor(Math.random()*2), i*16, y*16); if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; });
        } setInterval(draw, 35);
    </script>
</body>
</html>
